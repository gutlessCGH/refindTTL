# Hide default refind text, ui elements
# All are hidden by default only for the sake of minimalism
hideui arrows,hints,label,badges

# Set icon directory
icons_dir themes/refindTTL/icons176

# Set background
# Custom backgrounds won't work well unless they are entirely white in the center
banner themes/refindTTL/backgrounds/blank.png
banner_scale fillscreen

# Set icon sizes (default: 90, 176)
# Changing these will impact image quality; switch to 'theme.conf' in 'refind.conf' for larger icons
small_icon_size 90
big_icon_size 176

# Keeps the screen blank when launching an OS, prevents basic boot info from flashing on screen
use_graphics_for osx,linux,elilo,grub,windows

# Set background for selected icon
# To hide text label change to 'selection_big_nolabels176.png', 'selection_small_nolabels176.png'
selection_big   themes/refindTTL/backgrounds/selection_big176.png
selection_small themes/refindTTL/backgrounds/selection_small176.png

# Set maximum icons to display at a time (divide screen width by 198)
max_tags 7

# Set delay before automatic boot
timeout 10
